<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web to APK Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background-color: #1e293b; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); width: 100%; max-width: 450px; text-align: center; }
        label { display: block; text-align: left; font-weight: bold; margin-top: 15px; margin-bottom: 5px; font-size: 14px; color: #cbd5e1; }
        input[type="url"], input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; background: #334155; color: white; box-sizing: border-box; }
        .file-upload { display: block; border: 2px dashed #475569; padding: 20px; border-radius: 8px; margin: 15px 0 5px 0; cursor: pointer; color: #94a3b8; text-align: center; background: #1e293b; }
        .file-upload input { display: none; }
        button { width: 100%; padding: 14px; background-color: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #475569; cursor: not-allowed; }
        
        /* Box Hasil & Share Link */
        #result { margin-top: 25px; padding: 20px; background: #1e293b; border-radius: 8px; border: 1px solid #334155; text-align: left; }
        .share-box { margin-top: 15px; }
        .share-input-group { display: flex; margin-top: 5px; gap: 5px; }
        .share-input-group input { flex: 1; padding: 10px; border-radius: 6px; border: none; background: #0f172a; color: #64748b; font-family: monospace; font-size: 13px; width: 100%; box-sizing: border-box; }
        .copy-btn { width: auto; margin: 0; padding: 10px 15px; background: #475569; font-size: 14px; border-radius: 6px; color: #94a3b8; cursor: not-allowed; }
        .download-btn { display: none; text-align: center; margin-top: 15px; padding: 12px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
        .download-btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top:0; color:#3b82f6;">Web to APK</h2>
        <p style="color:#94a3b8; margin-bottom:20px;">Ubah website menjadi aplikasi Android dalam sekejap</p>
        
        <form id="apkForm">
            <label for="url">URL WEBSITE</label>
            <input type="url" id="url" placeholder="https://website-kamu.com" required>
            
            <label for="appName">NAMA APLIKASI</label>
            <input type="text" id="appName" placeholder="Contoh: Tokoku" required>
            
            <label class="file-upload" id="uploadLabel">
                📥 Klik untuk upload Logo (.PNG / .JPG)
                <input type="file" id="logo" accept="image/png, image/jpeg" required>
            </label>
            <small id="fileName" style="color: #10b981; display: block; text-align: left; margin-top: 5px;"></small>

            <button type="submit" id="submitBtn">Generate & Kirim APK</button>
        </form>

        <div id="result">
            <span id="statusTitle" style="font-size: 16px; color: #94a3b8;">📋 <b>Status APK: Belum Dibuat</b></span>
            <p id="statusDesc" style="margin: 5px 0 0 0; font-size: 13px; color: #64748b;">Silakan isi formulir di atas lalu klik tombol Generate.</p>
            
            <div class="share-box">
                <label style="color: #cbd5e1; margin-top: 0; font-size: 13px;">🔗 Link untuk Dibagikan (Share):</label>
                <div class="share-input-group">
                    <input type="text" id="shareLinkUrl" placeholder="Link otomatis muncul di sini setelah sukses..." readonly>
                    <button type="button" id="copyBtn" class="copy-btn" onclick="copyLink()" disabled>Salin</button>
                </div>
            </div>

            <a href="#" id="downloadLink" class="download-btn" target="_blank">Buka Halaman Download APK</a>
        </div>
    </div>

    <script>
        document.getElementById('logo').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            if(fileName) document.getElementById('fileName').innerText = 'Logo terpilih: ' + fileName;
        });

        document.getElementById('apkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Memproses...';
            btn.disabled = true;

            const url = document.getElementById('url').value;
            const appName = document.getElementById('appName').value;
            const logoFile = document.getElementById('logo').files[0];

            const reader = new FileReader();
            reader.readAsDataURL(logoFile);
            reader.onloadend = async () => {
                const logoBase64 = reader.result;

                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url, appName, logo: logoBase64 })
                    });
                    
                    const data = await res.json();
                    if (data.success) {
                        // Ubah tampilan menjadi Hijau Sukses
                        document.getElementById('result').style.background = '#064e3b';
                        document.getElementById('result').style.borderColor = '#059669';
                        document.getElementById('statusTitle').innerHTML = '🚀 <b style="color:white;">Sukses Merakit!</b>';
                        document.getElementById('statusDesc').innerText = 'Sistem sedang merakit APK-mu (butuh waktu sekitar 3 menit).';
                        document.getElementById('statusDesc').style.color = '#a7f3d0';
                        
                        // Isi Link Share & Aktifkan Tombol Salin
                        const shareInput = document.getElementById('shareLinkUrl');
                        shareInput.value = data.releaseUrl;
                        shareInput.style.color = '#10b981';
                        
                        const copyBtn = document.getElementById('copyBtn');
                        copyBtn.disabled = false;
                        copyBtn.style.background = '#10b981';
                        copyBtn.style.color = 'white';
                        copyBtn.style.cursor = 'pointer';
                        
                        // Tampilkan tombol download utama
                        const dlLink = document.getElementById('downloadLink');
                        dlLink.href = data.releaseUrl;
                        dlLink.style.display = 'block';
                        
                        btn.innerText = 'Generate & Kirim APK';
                        btn.disabled = false;
                    } else {
                        alert('Terjadi kesalahan: ' + data.error);
                        btn.innerText = 'Coba Lagi';
                        btn.disabled = false;
                    }
                } catch (err) {
                    alert('Gagal menghubungi server. Periksa kembali Environment Variables di Vercel.');
                    btn.innerText = 'Coba Lagi';
                    btn.disabled = false;
                }
            };
        });

        function copyLink() {
            const copyText = document.getElementById("shareLinkUrl");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("Link download berhasil disalin! Siap dibagikan ke WhatsApp.");
        }
    </script>
</body>
</html>
